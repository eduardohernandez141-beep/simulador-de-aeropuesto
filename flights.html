<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroDash Pro | Explorar Vuelos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/flights.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-plane-departure"></i>
            <span>AeroDash Pro</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="flights.html" class="nav-link active"><i class="fas fa-search"></i> Explorar Vuelos</a>
            <a href="my-bookings.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Mis Reservas</a>
            <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Mi Perfil</a>
            <a href="admin/admin-dashboard.html" class="nav-link admin-link" id="adminNavLink" style="display:none;"><i class="fas fa-crown"></i> Admin</a>
        </div>
        <div class="nav-user">
            <i class="fas fa-user-circle"></i>
            <span id="userNameNav"></span>
            <button onclick="logout()" class="logout-icon"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <h1><i class="fas fa-search"></i> Explorar Vuelos</h1>
            <p>Encuentra y reserva los mejores vuelos al mejor precio</p>
        </div>

        <div class="filters-card">
            <div class="filters-grid">
                <div class="filter-group">
                    <label><i class="fas fa-map-marker-alt"></i> Origen</label>
                    <input type="text" id="filterOrigen" placeholder="Ciudad de origen" class="filter-input">
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-map-marker-alt"></i> Destino</label>
                    <input type="text" id="filterDestino" placeholder="Ciudad de destino" class="filter-input">
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-calendar"></i> Fecha</label>
                    <input type="date" id="filterFecha" class="filter-input">
                </div>
                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button id="searchFlightsBtn" class="btn-primary">Buscar Vuelos</button>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-plane"></i> Vuelos Disponibles</h2>
                <span id="resultsCount" class="results-badge"></span>
            </div>
            <div id="flightsList" class="flights-grid"></div>
        </div>
    </main>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reservar Vuelo</h2>
                <button class="close-modal" onclick="closeBookingModal()">&times;</button>
            </div>
            <div id="modalFlightInfo"></div>
            <div class="form-group">
                <label>Selecciona tu asiento</label>
                <div class="seat-scroll-container">
                    <div id="seatSelector" class="seat-grid"></div>
                </div>
            </div>
            <div class="form-group">
                <label>Método de pago</label>
                <select id="paymentMethod" class="filter-input">
                    <option value="Tarjeta de Crédito">💳 Tarjeta de Crédito</option>
                    <option value="Tarjeta de Débito">💳 Tarjeta de Débito</option>
                    <option value="PayPal">💰 PayPal</option>
                    <option value="Transferencia">🏦 Transferencia Bancaria</option>
                </select>
            </div>
            <button id="confirmBookingBtn" class="btn-primary btn-block" onclick="confirmBooking()">Confirmar Reserva</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/flights.js"></script>
    <script src="js/bookings.js"></script>
</body>
</html>
