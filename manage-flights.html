<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroDash Pro | Gestionar Vuelos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-plane-departure"></i>
            <span>AeroDash Pro</span>
        </div>
        <div class="nav-links">
            <a href="../dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="../flights.html" class="nav-link"><i class="fas fa-search"></i> Explorar Vuelos</a>
            <a href="../my-bookings.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Mis Reservas</a>
            <a href="../profile.html" class="nav-link"><i class="fas fa-user"></i> Mi Perfil</a>
            <a href="admin-dashboard.html" class="nav-link active admin-link"><i class="fas fa-crown"></i> Admin</a>
        </div>
        <div class="nav-user">
            <i class="fas fa-user-circle"></i>
            <span id="userNameNav"></span>
            <button onclick="logout()" class="logout-icon"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <h1><i class="fas fa-plane"></i> Gestionar Vuelos</h1>
            <p>Administra todos los vuelos del sistema</p>
        </div>

        <div class="admin-form-card">
            <h3 id="flightFormTitle"><i class="fas fa-plus-circle"></i> Crear Nuevo Vuelo</h3>
            <form id="flightForm">
                <input type="hidden" id="editFlightId">
                <div class="input-row">
                    <div class="input-group">
                        <label>Código del Vuelo</label>
                        <input type="text" id="flightCodigo" placeholder="Ej: AV101" required>
                    </div>
                    <div class="input-group">
                        <label>Precio ($)</label>
                        <input type="number" id="flightPrecio" placeholder="150" required min="1">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Origen</label>
                        <input type="text" id="flightOrigen" placeholder="Ciudad de origen" required>
                    </div>
                    <div class="input-group">
                        <label>Destino</label>
                        <input type="text" id="flightDestino" placeholder="Ciudad de destino" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Fecha de Salida</label>
                        <input type="datetime-local" id="flightSalida" required>
                    </div>
                    <div class="input-group">
                        <label>Fecha de Llegada</label>
                        <input type="datetime-local" id="flightLlegada" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Duración</label>
                        <input type="text" id="flightDuracion" placeholder="Ej: 1h 30m" required>
                    </div>
                    <div class="input-group">
                        <label>Puerta</label>
                        <input type="text" id="flightPuerta" placeholder="Ej: B12" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Estado</label>
                    <select id="flightEstado" class="filter-input">
                        <option value="Programado">Programado</option>
                        <option value="Retrasado">Retrasado</option>
                        <option value="Cancelado">Cancelado</option>
                        <option value="Completado">Completado</option>
                    </select>
                </div>
                <div style="display:flex;gap:12px;margin-top:12px;">
                    <button type="submit" class="btn-primary" style="flex:1;">Guardar Vuelo</button>
                    <button type="button" class="btn-secondary" onclick="resetFlightForm()">Cancelar</button>
                </div>
                <div id="flightFormMessage" class="message"></div>
            </form>
        </div>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-list"></i> Lista de Vuelos</h2>
                <span id="adminFlightsCount" class="results-badge"></span>
            </div>
            <div id="adminFlightsList" class="flights-grid"></div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/flights.js"></script>
    <script src="../js/bookings.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
